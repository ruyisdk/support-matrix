# $schema: docs/schemas/config.schema.json
# yaml-language-server: $schema=docs/schemas/config.schema.json

# This file has a schema, ypu can read it to get additional definations
# Suggest use: yaml-language-server in vscode to see comments and auto-complitions

util:
    general_ver_mapper: &general_ver_mapper
    # this version mapper cam map any version like (v?)a.b(.c)?(-*)*(-sp*)*(-*)
        type: lambda
        mapper: 'lambda ver, info: [(m := re.match(r"(v)?(\d+)\.(\d+)(\.(\d+))?((-(?:(?!SP)\w+))*)(-SP(\d+))?((-(\w+))*)?((\+(\w+))*)?", ver), f"{m[2]}.{m[3]}.{m[5] or 0}-{m[9] or 0}{m[6] or ""}{m[10] or ""}{m[13] or ""}")[-1] for re in [__import__("re")]][0]'
    do_nothing_mapper: &do_nothing_mapper
            regex: 'v?(.*)'
            mapper: '{0}'
    date_middle_mapper: &date_middle_mapper
        regex: '(.*)'
        mapper: '0.{0}.0'

handler:
    -   plugin: github_release_simple
        id: buildroot-sipeed-licheervnano
        vendor: sipeed-licheervnano
        system: buildroot
        variant: null
        repo: sipeed/LicheeRV-Nano-Build
        strategy: dd_v1
        partition_map: disk
        release_filter:
            type: lambda
            filter: "lambda name, info: info.version in name"
        version_mapper:
            <<: *date_middle_mapper
        asset_filter:
            filter: .*\.img

    -   plugin: github_release_simple
        vendor: sipeed-licheervnano
        system: debian
        variant: null
        repo: Fishwaldo/sophgo-sg200x-debian
        release_filter:
            type: lambda
            filter: "lambda name, info: info.version in name"
        version_mapper:
            <<: *do_nothing_mapper
        asset_filter:
            filter: '^licheervnano.*\.img.*$'

    -   plugin: mirrorsite_getter_simple
        vendor: milkv-pioneer
        system: revyos
        variant: null
        url:
            regex: .*
            mapper: https://mirror.iscas.ac.cn/revyos/extra/images/sg2042/{0}/
        file_filter:
            filter: ^revyos-pioneer.*\.img.*(?<!sum)$
        version_mapper:
            <<: *date_middle_mapper
        desc_mapper:
            mapper: RevyOS {info.version} image for Milk-V Pioneer Box with SG2042

    -   plugin: github_release_simple
        vendor: milkv-duo
        system: buildroot
        variant: null
        repo: milkv-duo/duo-buildroot-sdk-v2
        release_filter:
            type: lambda
            filter: "lambda name, info: info.version in name"
        version_mapper:
            <<: *do_nothing_mapper
        asset_filter:
            filter: ^milkv-duo-.*riscv64.*sd.*\.img.*$

    # Comment this because it also contains build date, wait until full rules from ruyi
