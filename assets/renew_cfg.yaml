                    filter: 'lambda name, info: "root-" in name'
                partition_map: "root"
            -   id: "uboot 8g file"
                fileset: [ uboot-8g ]
                file_filter:
                    type: lambda
                    filter: 'lambda name, info: "u-boot-" in name and "lc4a-main" in name'
                partition_map: "uboot"
            -   id: "uboot 16g file"
                fileset: [ uboot-16g ]
                file_filter:
                    type: lambda
                    filter: 'lambda name, info: "u-boot-" in name and "lc4a-16g-main" in name'
                partition_map: "uboot"
        url:
            regex: (.*)
            mapper: 'https://mirror.iscas.ac.cn/revyos/extra/images/lpi4amain/{0}/'

    -   plugin: mirrorsite_getter_simple
        vendor: bpi-f3
        system: bianbu
        variant: null
        url:
            regex: .*
            mapper: https://archive.spacemit.com/image/k1/version/bianbu/{0}/
        file_filter:
            type: lambda
            filter: 'lambda name, info: "desktop" in name and "k1" in name and "img" in name and "md5" not in name'
        version_mapper:
            <<: *general_ver_mapper
        desc_mapper:
            mapper: Official bianbu desktop image for Banana Pi F3 version {info.version}

    -   plugin: mirrorsite_getter_simple
        vendor: bpi-f3
        system: openkylin
        variant: null
        url:
            regex: .*
            mapper: https://mirror.iscas.ac.cn/openkylin-cdimage/{0}/
        file_filter:
            type: lambda
            filter: 'lambda name, info: "openKylin-Embedded" in name and "spacemit-k1" in name'
        version_mapper:
            <<: *general_ver_mapper
        desc_mapper:
            mapper: Official OpenKylin Embedded image for Banana Pi F3 version {info.version}

    -   plugin: mirrorsite_getter_std
        vendor: milkv-meles
        system: revyos
        variant: null
        board_variants: [ 8g, 16g ]
        version_mapper:
            <<: *date_middle_mapper
        strategy: fastboot-v1
        fileset:
            -   id: 'main'
                board_variants: null
                desc_mapper:
                    mapper: 'RevyOS {info.version} image for Milk-V Meles using EMMC'
            -   id: 'uboot-8g'
                prepend: 'uboot'
                board_variants: [ 8g ]
                desc_mapper:
                    mapper: 'U-Boot image for Milk-V Meles (8G RAM) and RevyOS {info.version}'
            -   id: 'uboot-16g'
                prepend: 'uboot'
                board_variants: [ 16g ]
                desc_mapper:
                    mapper: 'U-Boot image for Milk-V Meles (16G RAM) and RevyOS {info.version}'
        files:
            -   id: "boot file"
                fileset: [ main ]
                file_filter:
                    type: lambda
                    filter: 'lambda name, info: "boot-" in name and "u-boot" not in name'
                partition_map: "boot"
            -   id: "root file"
                fileset: [ main ]
                file_filter:
                    type: lambda
                    filter: 'lambda name, info: "root-" in name'
                partition_map: "root"
            -   id: "uboot 8g file"
                fileset: [ uboot-8g ]
                file_filter:
                    type: lambda
                    filter: 'lambda name, info: "u-boot-" in name and "16g" not in name and "4g" not in name'
                partition_map: "uboot"
            -   id: "uboot 16g file"
                fileset: [ uboot-16g ]
                file_filter:
                    type: lambda
                    filter: 'lambda name, info: "u-boot-" in name and "16g" in name'
                partition_map: "uboot"
        url:
            regex: (.*)
            mapper: 'https://mirror.iscas.ac.cn/revyos/extra/images/meles/{0}/'
        name_mapper:
            regex: (.*)
            mapper: RevyOS image for Milk-V Meles using EMMC

