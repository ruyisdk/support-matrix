    -   plugin: github_release_simple
        vendor: milkv-duo256m
        system: buildroot
        variant: null
        repo: milkv-duo/duo-buildroot-sdk-v2
        release_filter:
            type: lambda
            filter: "lambda name, info: info.version in name"
        version_mapper:
            <<: *do_nothing_mapper
        asset_filter:
            filter: ^milkv-duo256m-.*riscv64.*sd.*\.img.*$

    -   plugin: github_release_simple
        vendor: milkv-duo256m
        system: debian
        variant: null
        repo: Fishwaldo/sophgo-sg200x-debian
        release_filter:
            type: lambda
            filter: "lambda name, info: info.version in name"
        version_mapper:
            <<: *do_nothing_mapper
        asset_filter:
            filter: '^duo256_.*sd.*\.img.*$'

    -   plugin: github_release_simple
        vendor: milkv-duos
        system: buildroot
        variant: sd
        repo: milkv-duo/duo-buildroot-sdk-v2
        release_filter:
            type: lambda
            filter: "lambda name, info: info.version in name"
        version_mapper:
            <<: *do_nothing_mapper
        asset_filter:
            filter: ^milkv-duos-.*riscv64.*sd.*\.img.*$

    -   plugin: github_release_simple
        vendor: milkv-duos
        system: debian
        variant: sd
        repo: Fishwaldo/sophgo-sg200x-debian
        release_filter:
            type: lambda
            filter: "lambda name, info: info.version in name"
        version_mapper:
            <<: *do_nothing_mapper
        asset_filter:
            filter: ^duos_.*sd.*\.img.*$

    -   plugin: mirrorsite_getter_std
        vendor: sipeed-lpi4a
        system: revyos
        variant: null
        board_variants: [ 8g, 16g ]
        version_mapper:
            <<: *date_middle_mapper
        strategy: fastboot-v1
        fileset:
            -   id: 'main'
                board_variants: null
                desc_mapper:
                    mapper: 'RevyOS {info.version} image for Sipeed LicheePi 4A'
            -   id: 'uboot-8g'
                prepend: 'uboot'
                board_variants: [ 8g ]
                desc_mapper:
                    mapper: 'U-Boot image for LicheePi 4A (8G RAM) and RevyOS {info.version}'
            -   id: 'uboot-16g'
                prepend: 'uboot'
                board_variants: [ 16g ]
                desc_mapper:
                    mapper: 'U-Boot image for LicheePi 4A (16G RAM) and RevyOS {info.version}'
        files:
            -   id: "boot file"
                fileset: [ main ]
                file_filter:
                    type: lambda
                    filter: 'lambda name, info: "boot-" in name and "u-boot" not in name'
                partition_map: "boot"
            -   id: "root file"
                fileset: [ main ]
                file_filter:
                    type: lambda
                    filter: 'lambda name, info: "root-" in name'
                partition_map: "root"
            -   id: "uboot 8g file"
                fileset: [ uboot-8g ]
                file_filter:
                    type: lambda
                    filter: 'lambda name, info: "u-boot-" in name and "lpi4a-main" in name'
                partition_map: "uboot"
            -   id: "uboot 16g file"
                fileset: [ uboot-16g ]
                file_filter:
                    type: lambda
                    filter: 'lambda name, info: "u-boot-" in name and "lpi4a-16g-main" in name'
                partition_map: "uboot"
        url:
            regex: (.*)
            mapper: 'https://mirror.iscas.ac.cn/revyos/extra/images/lpi4a/{0}/'

    -   plugin: mirrorsite_getter_std
        vendor: sipeed-lc4a
        system: revyos
        variant: null
        board_variants: [ 8g, 16g ]
        version_mapper:
            <<: *date_middle_mapper
        strategy: fastboot-v1
        fileset:
            -   id: 'main'
                board_variants: null
                desc_mapper:
                    mapper: 'RevyOS {info.version} image for Sipeed LicheeCluster 4A'
            -   id: 'uboot-8g'
                prepend: 'uboot'
                board_variants: [ 8g ]
                desc_mapper:
                    mapper: 'U-Boot image for LicheeCluster 4A (8G RAM) and RevyOS {info.version}'
            -   id: 'uboot-16g'
                prepend: 'uboot'
                board_variants: [ 16g ]
                desc_mapper:
                    mapper: 'U-Boot image for LicheeCluster 4A (16G RAM) and RevyOS {info.version}'
        files:
            -   id: "boot file"
                fileset: [ main ]
                file_filter:
                    type: lambda
                    filter: 'lambda name, info: "boot-" in name and "u-boot" not in name'
                partition_map: "boot"
            -   id: "root file"
                fileset: [ main ]
